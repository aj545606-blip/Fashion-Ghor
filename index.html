<!DOCTYPE html>
<html>
<head>
  <title>Fashion Ghor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 8px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 5px;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 10px;
      text-align: center;
      border-top: 1px solid #ccc;
    }
  </style>
</head>

<body>

<header>🛍️ Fashion Ghor</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>T-Shirt</h3>
    <p class="price">৳350</p>
    <button onclick="alert('Order system coming next version')">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Hoodie</h3>
    <p class="price">৳850</p>
    <button onclick="alert('Order system coming next version')">Buy</button>
  </div>

</div>

<footer>
  Cash on Delivery | bKash | Nagad (Coming Soon)
</footer>

</body>
</html>
